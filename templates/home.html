{% extends "base.html" %}
{% block title %}TODO Home{% endblock %}
{% block body %}
<div class="container mx-auto p-4 flex flex-col gap-2">
    <h1 class="text-3xl font-bold">TODO Home</h1>
    <table class="table w-full">
        <thead>
            <tr>
                <th>Title</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for todo in todos %}
            {% include "todo_row.html" %}
            {% endfor %}
            <tr>
                <td>
                    <button
                        class="btn btn-primary"
                        hx-post="/create"
                        hx-target="closest tr"
                        hx-swap="beforebegin"
                    >Create</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %}
